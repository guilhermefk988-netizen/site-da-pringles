<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="/PLINGLES/pringles.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="header2">
        <div class="login">
            <div class="tela1-esconde">
                <h2>Seja Bem vindo</h2>
                <div class="Tela1-texto">
                    <p>Fassa seu login</p>
                    <p onclick="loginAparessa()">FAZER LOGIN</p>
                </div>



            </div>

            <div class="tela1">
                <div class="tela-login">
                    <h2>Login</h2>
                    <label for="Gmail">Gmail</label>
                    <input placeholder="Digite seu Gmail" id="Gmail" type="email">
                    <label for="senha">Senha</label>
                    <input id="senha" placeholder="Digite sua Senha" type="password">
                    <img onclick="ver()" id="olho-senha" width="24" height="24"
                        src="https://img.icons8.com/material-outlined/24/invisible.png" alt="invisible" />
                    <img onclick="naover()" id="olho-texto" width="24" height="24"
                        src="https://img.icons8.com/material-outlined/24/visible--v1.png" alt="visible--v1" />

                    <a href="/PLINGLES/index.html">Avançar</a>
                    <p>Ou Continuar com</p>
                    <div class="imagem">

                        <img width="30" height="30" src="https://img.icons8.com/material-rounded/24/google-logo.png"
                            alt="google-logo" />
                        <img width="30" height="30" src="https://img.icons8.com/material-sharp/24/github.png"
                            alt="github" />
                    </div>
                </div>
            </div>


            <div class="tela2">
                <div class="texto-Tela2">
                    <h2>Seja bem Vindo</h2>
                    <div class="texto-telas2">
                        <p>Cadastra-se ao Site</p>
                        <p onclick="cadastro()">Cadastro</p>
                    </div>
                </div>
            </div>



            <div class="tela-esconde2">
                <h2>tela esconde2</h2>
                <div class="cadatro">
                    <label for="nome">Nome</label>
                    <input id="nome" placeholder="Nome completo" type="text">
                    <label for="">Email</label>
                    <input id="Email" placeholder="Digite seu Email" type="email">
                    <label for="Senha">Senha</label>
                    <input id="Senha" placeholder="Digite sua Senha" type="text">
                
                <a href="/PLINGLES/index.html">Registra-se</a>
            </div>
        </div>

        </div>
    </header>
</body>
<script src="/PLINGLES/pringles.js"></script>

</html>
